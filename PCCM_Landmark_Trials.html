<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f2740">
<title>PCCM Landmark Trials</title>
<style>
:root{--navy:#0f2740;--navy2:#1f3a5f;--accent:#2f80ed;--bg:#f4f6f9;--card:#fff;--line:#e2e8f0;--muted:#64748b;--ink:#1a2433;--gold:#e0a83a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45;}
header{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:12px 14px 10px;padding-top:calc(12px + env(safe-area-inset-top));box-shadow:0 2px 10px rgba(0,0,0,.15);}
.title{font-size:18px;font-weight:700;letter-spacing:.2px;}
.deckwrap{display:flex;gap:6px;margin-top:9px;background:rgba(255,255,255,.12);border-radius:11px;padding:4px;}
.deckbtn{flex:1;border:none;background:transparent;color:#cdd8e6;font-size:13px;font-weight:700;padding:9px 6px;border-radius:8px;cursor:pointer;line-height:1.2;}
.deckbtn.active{background:#fff;color:var(--navy);}
.search{margin-top:9px;position:relative;}
.search input{width:100%;padding:11px 38px 11px 14px;border-radius:12px;border:none;font-size:16px;background:#fff;color:#1a2433;}
.search .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:#e2e8f0;color:#475569;width:26px;height:26px;border-radius:50%;font-size:16px;line-height:1;cursor:pointer;display:none;}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;background:var(--navy2);position:sticky;top:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:7px 13px;border-radius:20px;background:rgba(255,255,255,.12);color:#e8eef6;font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer;}
.chip.active{background:#fff;color:var(--navy);}
.overview{margin:8px 14px 0;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.overview>summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:13px;font-weight:700;color:var(--navy2);display:flex;justify-content:space-between;align-items:center;}
.overview>summary::-webkit-details-marker{display:none;}
.ovgrid{padding:6px 12px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media (max-width:560px){.ovgrid{grid-template-columns:1fr;}}
.ovrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 11px;background:#f6f8fb;border-radius:8px;font-size:12.5px;cursor:pointer;border:1px solid transparent;min-width:0;}
.ovrow:active{border-color:var(--accent);}
.ovrow .dn{color:var(--ink);font-weight:600;flex:1;min-width:0;line-height:1.25;}
.ovrow .dc{flex:none;color:#fff;background:var(--navy2);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700;min-width:26px;text-align:center;}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px 2px;flex-wrap:wrap;}
.toolbar .lbl{font-size:12px;color:var(--muted);font-weight:600;}
.segwrap{display:inline-flex;background:#e8edf3;border-radius:9px;padding:3px;gap:2px;}
.seg{border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;}
.seg.active{background:#fff;color:var(--navy2);box-shadow:0 1px 2px rgba(15,39,64,.12);}
.favfilter{margin-left:auto;border:1px solid var(--gold);background:#fff;color:#9a7011;font-size:13px;font-weight:700;padding:7px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.favfilter.active{background:var(--gold);color:#3a2a05;}
.count{padding:8px 14px 2px;font-size:12px;color:var(--muted);}
.wrap{padding:6px 14px 40px;max-width:820px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:10px 0;overflow:hidden;box-shadow:0 1px 3px rgba(15,39,64,.06);}
.card.fav{border-color:#f0d18a;box-shadow:0 1px 4px rgba(224,168,58,.22);}
.card summary{list-style:none;cursor:pointer;padding:13px 44px 13px 14px;display:flex;flex-direction:column;gap:5px;position:relative;}
.card summary::-webkit-details-marker{display:none;}
.favbtn{position:absolute;top:9px;right:8px;border:none;background:transparent;font-size:23px;line-height:1;color:#cbd5e1;cursor:pointer;padding:3px 5px;}
.favbtn.on{color:var(--gold);}
.row1{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.tname{font-size:16px;font-weight:700;color:var(--navy2);}
.yr{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}
.dchip{align-self:flex-start;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);background:#eaf2fd;padding:2px 8px;border-radius:6px;}
.blurb{font-size:14px;color:#334155;}
.meta{font-size:12px;color:var(--muted);}
.detail{padding:0 14px 14px;border-top:1px solid var(--line);}
.cmpbtn{width:100%;margin-top:12px;border:1px solid var(--navy2);background:#eef2f8;color:var(--navy2);font-size:13px;font-weight:700;padding:10px;border-radius:10px;cursor:pointer;}
.f{margin-top:11px;}
.f .lab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;}
.f .val{font-size:14px;color:var(--ink);}
.result{background:#f0f6ff;border-left:3px solid var(--accent);padding:8px 10px;border-radius:6px;font-size:14px;}
.caveat{background:#fff7ed;border-left:3px solid #f59e0b;padding:8px 10px;border-radius:6px;font-size:14px;}
.practice{background:#f0fdf4;border-left:3px solid #16a34a;padding:8px 10px;border-radius:6px;font-size:14px;}
.pmlink{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:13px;font-weight:600;color:#fff;background:var(--accent);padding:8px 13px;border-radius:9px;text-decoration:none;}
mark{background:#fde68a;padding:0 1px;border-radius:2px;}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
footer{text-align:center;font-size:11px;color:var(--muted);padding:16px;line-height:1.5;}
.cmpback{position:fixed;inset:0;background:rgba(15,39,64,.55);z-index:50;display:none;}
.cmpback.open{display:block;}
.cmpsheet{position:fixed;left:0;right:0;bottom:0;top:8vh;background:var(--bg);z-index:51;display:none;flex-direction:column;border-radius:16px 16px 0 0;overflow:hidden;}
.cmpsheet.open{display:flex;}
.cmphead{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cmphead .h{font-size:15px;font-weight:700;}
.cmphead .hs{font-size:12px;opacity:.75;}
.cmpclose{border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;width:34px;height:34px;border-radius:50%;cursor:pointer;flex:none;}
.cmpscroll{flex:1;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding:12px;}
.cmprow{display:flex;gap:12px;height:100%;}
.cmpcol{flex:0 0 260px;max-width:260px;background:#fff;border:1px solid var(--line);border-radius:12px;overflow-y:auto;padding:12px;}
.cmpcol.cur{border-color:var(--accent);box-shadow:0 0 0 2px rgba(47,128,237,.15);}
.cmpcol h4{margin:0 0 2px;font-size:15px;color:var(--navy2);}
.cmpcol .cyr{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;}
.cmpcol .fld{margin-top:9px;}
.cmpcol .fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.cmpcol .fv{font-size:12.5px;color:var(--ink);margin-top:1px;}
.cmpcol .fv.res{background:#f0f6ff;border-left:3px solid var(--accent);padding:5px 7px;border-radius:5px;}
.cmphint{font-size:11px;color:var(--muted);text-align:center;padding:0 12px 8px;}
</style>
</head>
<body>
<header>
  <div class="title">PCCM Landmark Trials</div>
  <div class="deckwrap" id="deckwrap">
    <button class="deckbtn active" data-deck="icu">Critical Care</button>
    <button class="deckbtn" data-deck="pulm">Outpatient Pulmonary</button>
  </div>
  <div class="search">
    <input id="q" type="search" placeholder="Search trial, population, drug..." autocomplete="off">
    <button class="clear" id="clr">&times;</button>
  </div>
</header>
<div class="chips" id="chips"></div>
<details class="overview" id="overview">
  <summary><span>Overview by domain</span><span class="meta">tap to expand</span></summary>
  <div class="ovgrid" id="ovgrid"></div>
</details>
<div class="toolbar">
  <span class="lbl">Sort</span>
  <span class="segwrap" id="sort">
    <button class="seg active" data-sort="year">Year &darr;</button>
    <button class="seg" data-sort="yearAsc">Year &uarr;</button>
    <button class="seg" data-sort="name">Name A&ndash;Z</button>
  </span>
  <button class="favfilter" id="favfilter">&#9733; Favorites (<span id="favn">0</span>)</button>
</div>
<div class="count" id="count"></div>
<div class="wrap" id="list"></div>
<footer>Summarized and rounded for study use. Always confirm exact values, doses, and thresholds against the primary paper before any clinical or academic use.</footer>
<div class="cmpback" id="cmpback"></div>
<div class="cmpsheet" id="cmpsheet">
  <div class="cmphead"><div><div class="h" id="cmptitle"></div><div class="hs" id="cmpsubtitle"></div></div><button class="cmpclose" id="cmpclose">&times;</button></div>
  <div class="cmphint">swipe sideways to compare &rarr;</div>
  <div class="cmpscroll"><div class="cmprow" id="cmprow"></div></div>
</div>

function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function attr(s){return esc(s).replace(/"/g,"&quot;");}
function hl(s){if(!query)return esc(s);const re=new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");return esc(s).replace(re,"<mark>$1</mark>");}
function deckTrials(){return TRIALS.filter(t=>t.deck===activeDeck);}

function buildChips(){
  const dt=deckTrials();
  const domains=[...new Set(dt.map(t=>t.domain))].sort();
  chipsEl.innerHTML="";
  ["All",...domains].forEach(d=>{
    const b=document.createElement("button");
    b.className="chip"+(d===activeDomain?" active":"");b.dataset.d=d;
    const n=d==="All"?dt.length:dt.filter(t=>t.domain===d).length;
    b.textContent=(d==="All"?"All":d)+" ("+n+")";
    b.onclick=()=>{activeDomain=d;[...chipsEl.children].forEach(c=>c.classList.toggle("active",c.dataset.d===d));render();};
    chipsEl.appendChild(b);

}
function buildOverview(){
  const dt=deckTrials();
  const domains=[...new Set(dt.map(t=>t.domain))];
  ovEl.innerHTML="";
  domains.map(d=>[d,dt.filter(t=>t.domain===d).length]).sort((a,b)=>b[1]-a[1]).forEach(([d,n])=>{
    const r=document.createElement("div");r.className="ovrow";
    r.innerHTML=`<span class="dn">${esc(d)}</span><span class="dc">${n}</span>`;

function match(t){

  if(favOnly&&!favs.has(t.id))return false;
  if(activeDomain!=="All"&&t.domain!==activeDomain)return false;
  if(!query)return true;
  const hay=(t.trial+" "+t.population+" "+t.intervention+" "+t.outcome+" "+t.result+" "+t.bottom+" "+t.caveats+" "+t.practice+" "+t.journal+" "+t.year+" "+t.domain+" "+(t.family||"")).toLowerCase();

function sortRows(rows){

        <div class="f"><div class="lab">Population</div><div class="val">${hl(t.population)} <span class="meta">(N&asymp;${esc(t.n)})</span></div></div>
        <div class="f"><div class="lab">Intervention vs Control</div><div class="val">${hl(t.intervention)}</div></div>
        <div class="f"><div class="lab">Primary Outcome</div><div class="val">${hl(t.outcome)}</div></div>
        <div class="f"><div class="lab">Key Result</div><div class="val result">${hl(t.result)}</div></div>
        <div class="f"><div class="lab">Bottom Line</div><div class="val">${hl(t.bottom)}</div></div>
        <div class="f"><div class="lab">Caveats / Limitations</div><div class="val caveat">${hl(t.caveats)}</div></div>
        <div class="f"><div class="lab">Current Practice</div><div class="val practice">${hl(t.practice)}</div></div>
        ${pm(t)}
      </div>
    </details>`;}).join("");
}
listEl.addEventListener("click",e=>{
  const fb=e.target.closest(".favbtn");
  if(fb){e.preventDefault();e.stopPropagation();const id=fb.dataset.id;
    if(favs.has(id))favs.delete(id);else favs.add(id);saveFavs();
    const on=favs.has(id);fb.classList.toggle("on",on);fb.textContent=on?"★":"☆";fb.setAttribute("aria-pressed",on);
    fb.closest(".card").classList.toggle("fav",on);favnEl.textContent=favCountDeck();if(favOnly)render();return;}
  const cb=e.target.closest(".cmpbtn");
  if(cb){e.preventDefault();openCompare(cb.dataset.fam,cb.dataset.cur);}
});
const cmpback=document.getElementById("cmpback"),cmpsheet=document.getElementById("cmpsheet");
function openCompare(fam,curId){
  const list=(FAM[fam]||[]).slice().sort((a,b)=>(+a.year-+b.year));
  document.getElementById("cmptitle").textContent=fam;
  document.getElementById("cmpsubtitle").textContent=list.length+" trials · chronological";
  document.getElementById("cmprow").innerHTML=list.map(t=>`
    <div class="cmpcol${t.id===curId?' cur':''}">
      <h4>${esc(t.trial)}</h4>
      <div class="cyr">${esc(t.year)} · ${esc(t.journal)} · N&asymp;${esc(t.n)}</div>
      <div class="fld"><div class="fl">Population</div><div class="fv">${esc(t.population)}</div></div>
      <div class="fld"><div class="fl">Intervention</div><div class="fv">${esc(t.intervention)}</div></div>
      <div class="fld"><div class="fl">Primary outcome</div><div class="fv">${esc(t.outcome)}</div></div>
      <div class="fld"><div class="fl">Key result</div><div class="fv res">${esc(t.result)}</div></div>
      <div class="fld"><div class="fl">Bottom line</div><div class="fv">${esc(t.bottom)}</div></div>
    </div>`).join("");
  cmpback.classList.add("open");cmpsheet.classList.add("open");document.body.style.overflow="hidden";
}
function closeCompare(){cmpback.classList.remove("open");cmpsheet.classList.remove("open");document.body.style.overflow="";}
cmpback.onclick=closeCompare;document.getElementById("cmpclose").onclick=closeCompare;
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeCompare();});
document.getElementById("deckwrap").addEventListener("click",e=>{
  const b=e.target.closest(".deckbtn");if(!b)return;
  activeDeck=b.dataset.deck;activeDomain="All";
  [...b.parentNode.children].forEach(x=>x.classList.toggle("active",x===b));
  buildChips();buildOverview();render();window.scrollTo({top:0});
});
document.getElementById("sort").addEventListener("click",e=>{
  const b=e.target.closest(".seg");if(!b)return;sortMode=b.dataset.sort;
  [...b.parentNode.children].forEach(s=>s.classList.remove("active"));b.classList.add("active");render();
});
document.getElementById("favfilter").addEventListener("click",function(){favOnly=!favOnly;this.classList.toggle("active",favOnly);render();});
qEl.addEventListener("input",()=>{query=qEl.value.trim();clrEl.style.display=query?"block":"none";render();});
clrEl.onclick=()=>{qEl.value="";query="";clrEl.style.display="none";render();qEl.focus();};
buildChips();buildOverview();render();
</script>
</body>
</html>
