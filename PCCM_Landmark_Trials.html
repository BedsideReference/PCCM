<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f2740">
<title>PCCM Landmark Trials</title>
<style>
:root{--navy:#0f2740;--navy2:#1f3a5f;--accent:#2f80ed;--bg:#f4f6f9;--card:#fff;--line:#e2e8f0;--muted:#64748b;--ink:#1a2433;--gold:#e0a83a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45;}
header{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:14px 14px 10px;padding-top:calc(14px + env(safe-area-inset-top));box-shadow:0 2px 10px rgba(0,0,0,.15);}
.title{font-size:19px;font-weight:700;letter-spacing:.2px;}
.sub{font-size:12px;opacity:.75;margin-top:2px;}
.search{margin-top:10px;position:relative;}
.search input{width:100%;padding:11px 38px 11px 14px;border-radius:12px;border:none;font-size:16px;background:#fff;color:#1a2433;}
.search .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:#e2e8f0;color:#475569;width:26px;height:26px;border-radius:50%;font-size:16px;line-height:1;cursor:pointer;display:none;}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;background:var(--navy2);position:sticky;top:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:7px 13px;border-radius:20px;background:rgba(255,255,255,.12);color:#e8eef6;font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer;}
.chip.active{background:#fff;color:var(--navy);}
.overview{margin:8px 12px 0;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.overview>summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:13px;font-weight:700;color:var(--navy2);display:flex;justify-content:space-between;align-items:center;}
.overview>summary::-webkit-details-marker{display:none;}
.ovgrid{padding:4px 10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ovrow{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 10px;background:#f6f8fb;border-radius:8px;font-size:12.5px;cursor:pointer;border:1px solid transparent;}
.ovrow:active{border-color:var(--accent);}
.ovrow .dn{color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ovrow .dc{color:#fff;background:var(--navy2);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700;min-width:26px;text-align:center;}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px 2px;flex-wrap:wrap;}
.toolbar .lbl{font-size:12px;color:var(--muted);font-weight:600;}
.segwrap{display:inline-flex;background:#e8edf3;border-radius:9px;padding:3px;gap:2px;}
.seg{border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;}
.seg.active{background:#fff;color:var(--navy2);box-shadow:0 1px 2px rgba(15,39,64,.12);}
.favfilter{margin-left:auto;border:1px solid var(--gold);background:#fff;color:#9a7011;font-size:13px;font-weight:700;padding:7px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.favfilter.active{background:var(--gold);color:#3a2a05;}
.count{padding:8px 16px 2px;font-size:12px;color:var(--muted);}
.wrap{padding:6px 12px 40px;max-width:820px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:10px 0;overflow:hidden;box-shadow:0 1px 3px rgba(15,39,64,.06);}
.card.fav{border-color:#f0d18a;box-shadow:0 1px 4px rgba(224,168,58,.22);}
.card summary{list-style:none;cursor:pointer;padding:13px 44px 13px 14px;display:flex;flex-direction:column;gap:5px;position:relative;}
.card summary::-webkit-details-marker{display:none;}
.favbtn{position:absolute;top:9px;right:8px;border:none;background:transparent;font-size:23px;line-height:1;color:#cbd5e1;cursor:pointer;padding:3px 5px;transition:transform .1s;}
.favbtn:active{transform:scale(1.25);}
.favbtn.on{color:var(--gold);}
.row1{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.tname{font-size:16px;font-weight:700;color:var(--navy2);}
.yr{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}
.dchip{align-self:flex-start;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);background:#eaf2fd;padding:2px 8px;border-radius:6px;}
.blurb{font-size:14px;color:#334155;}
.meta{font-size:12px;color:var(--muted);}
.detail{padding:0 14px 14px;border-top:1px solid var(--line);}
.f{margin-top:11px;}
.f .lab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;}
.f .val{font-size:14px;color:var(--ink);}
.result{background:#f0f6ff;border-left:3px solid var(--accent);padding:8px 10px;border-radius:6px;font-size:14px;}
.caveat{background:#fff7ed;border-left:3px solid #f59e0b;padding:8px 10px;border-radius:6px;font-size:14px;}
.practice{background:#f0fdf4;border-left:3px solid #16a34a;padding:8px 10px;border-radius:6px;font-size:14px;}
.pmlink{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:13px;font-weight:600;color:#fff;background:var(--accent);padding:8px 13px;border-radius:9px;text-decoration:none;}
mark{background:#fde68a;padding:0 1px;border-radius:2px;}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
footer{text-align:center;font-size:11px;color:var(--muted);padding:16px;line-height:1.5;}
</style>
</head>
<body>
<header>
  <div class="title">PCCM Landmark Trials</div>
  <div class="sub">164 trials &middot; tap &#9734; to save favorites &middot; works offline</div>
  <div class="search">
    <input id="q" type="search" placeholder="Search trial, population, drug..." autocomplete="off">
    <button class="clear" id="clr">&times;</button>
  </div>
</header>
<div class="chips" id="chips"></div>
<details class="overview" id="overview">
  <summary><span>Overview by domain</span><span class="meta">tap to expand</span></summary>
  <div class="ovgrid" id="ovgrid"></div>
</details>
<div class="toolbar">
  <span class="lbl">Sort</span>
  <span class="segwrap" id="sort">
    <button class="seg active" data-sort="year">Year &darr;</button>
    <button class="seg" data-sort="yearAsc">Year &uarr;</button>
    <button class="seg" data-sort="name">Name A&ndash;Z</button>
  </span>
  <button class="favfilter" id="favfilter">&#9733; Favorites (<span id="favn">0</span>)</button>
</div>
<div class="count" id="count"></div>
<div class="wrap" id="list"></div>
<footer>Summarized and rounded for study use. Always confirm exact values, doses, and thresholds against the primary paper before any clinical or academic use.</footer>

 therapy reduces exacerbations vs dual", "pmid": "29668352", "caveats": "More pneumonia with ICS-containing arms", "practice": "Triple therapy for frequent exacerbators", "id": "IMPACT"}, {"domain": "COPD", "trial": "ETHOS", "year": "2020", "journal": "NEJM", "n": "8509", "population": "Moderate-to-very-severe COPD with exacerbation history", "intervention": "Budesonide-glycopyrrolate-formoterol (320 ug) vs dual therapies", "outcome": "Annual rate of moderate/severe exacerbations", "result": "Triple 1.08 vs GLY-FORM 1.42 (RR 0.76; P<0.001) and vs BUD-FORM 1.24 (RR 0.87; P=0.003)", "bottom": "Triple therapy reduces exacerbations vs LABA-LAMA and LABA-ICS", "pmid": "32579807", "caveats": "Higher-dose ICS pneumonia risk; benefit greatest at higher eosinophils", "practice": "Confirms triple therapy for frequent exacerbators", "id": "ETHOS"}, {"domain": "COPD", "trial": "LOTT", "year": "2016", "journal": "NEJM", "n": "738", "population": "Stable COPD with moderate resting or exertional desaturation", "intervention": "Long-term supplemental oxygen vs no oxygen", "outcome": "Time to death or first hospitalization", "result": "HR 0.94 (95% CI 0.79-1.12; P=0.52); no benefit on any secondary outcome", "bottom": "Supplemental O2 not beneficial for moderate desaturation", "pmid": "27783918", "caveats": "Excluded severe resting hypoxemia", "practice": "O2 not indicated for moderate (non-severe) desaturation", "id": "LOTT"}, {"domain": "COPD", "trial": "NOTT", "year": "1980", "journal": "Ann Intern Med", "n": "203", "population": "COPD with severe hypoxemia", "intervention": "Continuous vs 12-hour nocturnal oxygen", "outcome": "Mortality", "result": "Nocturnal-only mortality 1.94x continuous (P=0.01)", "bottom": "Continuous oxygen superior to nocturnal-only in hypoxemic COPD", "pmid": "6776858", "caveats": "Older trial; small N", "practice": "Basis for continuous LTOT in severe resting hypoxemia", "id": "NOTT"}, {"domain": "Asthma", "trial": "SYGMA 1", "year": "2018", "journal": "NEJM", "n": "3849", "population": "Mild asthma", "intervention": "As-needed budesonide-formoterol vs as-needed terbutaline vs maintenance budesonide", "outcome": "Percent of weeks with well-controlled asthma", "result": "34.4% vs 31.1% (OR 1.14, 95% CI 1.00-1.30; P=0.046); severe exacerbation RR 0.36 vs terbutaline", "bottom": "As-needed ICS-formoterol superior to SABA in mild asthma", "pmid": "29768149", "caveats": "Superior to SABA but inferior to daily ICS for symptom control", "practice": "Supports as-needed ICS-formoterol in mild asthma", "id": "SYGMA 1"}, {"domain": "Asthma", "trial": "SYGMA 2", "year": "2018", "journal": "NEJM", "n": "4215", "population": "Mild asthma", "intervention": "As-needed budesonide-formoterol vs maintenance budesonide + as-needed SABA", "outcome": "Annualized rate of severe exacerbations (noninferiority)", "result": "0.11 vs 0.12/yr (RR 0.97, upper 95% CL 1.16; noninferior)", "bottom": "As-needed ICS-formoterol noninferior to daily ICS for exacerbations", "pmid": "29768147", "caveats": "Symptom control slightly lower than maintenance ICS", "practice": "Anti-inflammatory reliever strategy adopted in guidelines", "id": "SYGMA 2"}, {"domain": "Asthma", "trial": "MENSA (mepolizumab)", "year": "2014", "journal": "NEJM", "n": "576", "population": "Severe eosinophilic asthma", "intervention": "Mepolizumab (IV or SC) vs placebo", "outcome": "Rate of exacerbations", "result": "IV -47% (95% CI 29-61); SC -53% (95% CI 37-65); both P<0.001", "bottom": "Mepolizumab reduces exacerbations in eosinophilic asthma", "pmid": "25199059", "caveats": "Effect limited to eosinophilic phenotype", "practice": "SC mepolizumab approved add-on for severe eosinophilic asthma", "id": "MENSA (mepolizumab)"}, {"domain": "Lung Cancer Screening", "trial": "NLST", "year": "2011", "journal": "NEJM", "n": "53454", "population": "High-risk smokers (age 55-74, >=30 pack-years)", "intervention": "Low-dose CT vs chest radiography, 3 annual rounds", "outcome": "Lung-cancer mortality", "result": "20.0% relative reduction (95% CI 6.8-26.7; P=0.004); all-cause mortality reduced 6.7% (P=0.02)", "bottom": "LDCT screening reduces lung-cancer mortality in high-risk smokers", "pmid": "21714641", "caveats": "High false-positive rate; comparator was CXR", "practice": "Basis for LDCT screening guidelines", "id": "NLST"}, {"domain": "Lung Cancer Screening", "trial": "NELSON", "year": "2020", "journal": "NEJM", "n": "15789", "population": "High-risk men (primary analysis); women in subgroup", "intervention": "Volume CT screening vs no screening", "outcome": "Lung-cancer mortality at 10 years", "result": "Men rate ratio 0.76 (95% CI 0.61-0.94; P=0.01); women RR 0.67 (95% CI 0.38-1.14)", "bottom": "Volume CT screening reduces lung-cancer mortality vs no screening", "pmid": "31995683", "caveats": "Primary analysis in men; women underpowered", "practice": "Reinforces LDCT screening against a no-screening comparator", "id": "NELSON"}, {"domain": "Sleep-Disordered Breathing", "trial": "SAVE", "year": "2016", "journal": "NEJM", "n": "2717", "population": "Moderate-severe OSA with established CV disease", "intervention": "CPAP plus usual care vs usual care alone", "outcome": "Composite of CV death, MI, stroke, or hospitalization for angina/HF/TIA", "result": "17.0% vs 15.4% (HR 1.10, 95% CI 0.91-1.32; P=0.34)", "bottom": "CPAP did not reduce CV events in OSA with CV disease", "pmid": "27571048", "caveats": "Low CPAP adherence (mean ~3.3 h); minimally symptomatic patients", "practice": "CPAP for symptoms/QoL, not proven for secondary CV prevention", "id": "SAVE"}];
const domains=[...new Set(TRIALS.map(t=>t.domain))].sort();
let activeDomain="All", query="", sortMode="year", favOnly=false;

// favorites persistence (degrades to in-memory if storage blocked)
let favs;
try{favs=new Set(JSON.parse(localStorage.getItem("pccm_favs")||"[]"));}catch(e){favs=new Set();}
function saveFavs(){try{localStorage.setItem("pccm_favs",JSON.stringify([...favs]));}catch(e){}}

const chipsEl=document.getElementById("chips");
const listEl=document.getElementById("list");
const countEl=document.getElementById("count");
const qEl=document.getElementById("q");
const clrEl=document.getElementById("clr");
const favnEl=document.getElementById("favn");

function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function attr(s){return esc(s).replace(/"/g,"&quot;");}
function hl(s){if(!query)return esc(s);const re=new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");return esc(s).replace(re,"<mark>$1</mark>");}

function setDomain(d){activeDomain=d;[...chipsEl.children].forEach(c=>c.classList.toggle("active",c.dataset.d===d));render();}
["All",...domains].forEach(d=>{
  const b=document.createElement("button");
  b.className="chip"+(d==="All"?" active":"");b.dataset.d=d;
  const n=d==="All"?TRIALS.length:TRIALS.filter(t=>t.domain===d).length;
  b.textContent=(d==="All"?"All":d)+" ("+n+")";
  b.onclick=()=>setDomain(d);
  chipsEl.appendChild(b);
});

const ov=document.getElementById("ovgrid");
domains.map(d=>[d,TRIALS.filter(t=>t.domain===d).length]).sort((a,b)=>b[1]-a[1]).forEach(([d,n])=>{
  const r=document.createElement("div");r.className="ovrow";
  r.innerHTML=`<span class="dn">${esc(d)}</span><span class="dc">${n}</span>`;
  r.onclick=()=>{setDomain(d);document.getElementById("overview").open=false;window.scrollTo({top:0,behavior:"smooth"});};
  ov.appendChild(r);
});

function match(t){
  if(favOnly&&!favs.has(t.id))return false;
  if(activeDomain!=="All"&&t.domain!==activeDomain)return false;
  if(!query)return true;
  const hay=(t.trial+" "+t.population+" "+t.intervention+" "+t.outcome+" "+t.result+" "+t.bottom+" "+t.caveats+" "+t.practice+" "+t.journal+" "+t.year+" "+t.domain).toLowerCase();
  return hay.includes(query.toLowerCase());
}
function sortRows(rows){
  const r=rows.slice();
  if(sortMode==="name") r.sort((a,b)=>a.trial.toLowerCase().localeCompare(b.trial.toLowerCase()));
  else if(sortMode==="yearAsc") r.sort((a,b)=>(+a.year-+b.year)||a.trial.localeCompare(b.trial));
  else r.sort((a,b)=>(+b.year-+a.year)||a.trial.localeCompare(b.trial));
  return r;
}
function pm(t){
  if(!t.pmid||t.pmid==="NA")return "";
  return `<a class="pmlink" href="https://pubmed.ncbi.nlm.nih.gov/${esc(t.pmid)}/" target="_blank" rel="noopener">View on PubMed &rarr; PMID ${esc(t.pmid)}</a>`;
}
function updateFavCount(){favnEl.textContent=favs.size;}
function render(){
  updateFavCount();
  const rows=sortRows(TRIALS.filter(match));
  countEl.textContent=rows.length+" trial"+(rows.length===1?"":"s")+(favOnly?" ★ favorites":"");
  if(!rows.length){listEl.innerHTML='<div class="empty">'+(favOnly?"No favorites yet.<br>Tap the ☆ on any card to save it here.":"No trials match.<br>Try a different search or filter.")+'</div>';return;}
  listEl.innerHTML=rows.map(t=>{const on=favs.has(t.id);return `
    <details class="card${on?' fav':''}">
      <summary>
        <button class="favbtn${on?' on':''}" data-id="${attr(t.id)}" aria-label="Toggle favorite" aria-pressed="${on}">${on?'★':'☆'}</button>
        <span class="dchip">${esc(t.domain)}</span>
        <span class="row1"><span class="tname">${hl(t.trial)}</span><span class="yr">${esc(t.year)} &middot; ${esc(t.journal)}</span></span>
        <span class="blurb">${hl(t.bottom)}</span>
      </summary>
      <div class="detail">
        <div class="f"><div class="lab">Population</div><div class="val">${hl(t.population)} <span class="meta">(N&asymp;${esc(t.n)})</span></div></div>
        <div class="f"><div class="lab">Intervention vs Control</div><div class="val">${hl(t.intervention)}</div></div>
        <div class="f"><div class="lab">Primary Outcome</div><div class="val">${hl(t.outcome)}</div></div>
        <div class="f"><div class="lab">Key Result</div><div class="val result">${hl(t.result)}</div></div>
        <div class="f"><div class="lab">Bottom Line</div><div class="val">${hl(t.bottom)}</div></div>
        <div class="f"><div class="lab">Caveats / Limitations</div><div class="val caveat">${hl(t.caveats)}</div></div>
        <div class="f"><div class="lab">Current Practice</div><div class="val practice">${hl(t.practice)}</div></div>
        ${pm(t)}
      </div>
    </details>`;}).join("");
}
// favorite toggle (delegated); preventDefault stops the <details> from toggling
listEl.addEventListener("click",e=>{
  const b=e.target.closest(".favbtn");if(!b)return;
  e.preventDefault();e.stopPropagation();
  const id=b.dataset.id;
  if(favs.has(id))favs.delete(id);else favs.add(id);
  saveFavs();
  const on=favs.has(id);
  b.classList.toggle("on",on);b.textContent=on?"★":"☆";b.setAttribute("aria-pressed",on);
  b.closest(".card").classList.toggle("fav",on);
  updateFavCount();
  if(favOnly)render();
});
document.getElementById("sort").addEventListener("click",e=>{
  const b=e.target.closest(".seg");if(!b)return;
  sortMode=b.dataset.sort;
  [...b.parentNode.children].forEach(s=>s.classList.remove("active"));b.classList.add("active");
  render();
});
document.getElementById("favfilter").addEventListener("click",function(){
  favOnly=!favOnly;this.classList.toggle("active",favOnly);render();
});
qEl.addEventListener("input",()=>{query=qEl.value.trim();clrEl.style.display=query?"block":"none";render();});
clrEl.onclick=()=>{qEl.value="";query="";clrEl.style.display="none";render();qEl.focus();};
render();
</script>
</body>
</html>
