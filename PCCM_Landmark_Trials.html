<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f2740">
<title>PCCM Landmark Trials</title>
<style>
:root{--navy:#0f2740;--navy2:#1f3a5f;--accent:#2f80ed;--bg:#f4f6f9;--card:#fff;--line:#e2e8f0;--muted:#64748b;--ink:#1a2433;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45;}
header{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:14px 14px 10px;padding-top:calc(14px + env(safe-area-inset-top));box-shadow:0 2px 10px rgba(0,0,0,.15);}
.title{font-size:19px;font-weight:700;letter-spacing:.2px;}
.sub{font-size:12px;opacity:.75;margin-top:2px;}
.search{margin-top:10px;position:relative;}
.search input{width:100%;padding:11px 38px 11px 14px;border-radius:12px;border:none;font-size:16px;background:#fff;color:#1a2433;}
.search .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:#e2e8f0;color:#475569;width:26px;height:26px;border-radius:50%;font-size:16px;line-height:1;cursor:pointer;display:none;}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;background:var(--navy2);position:sticky;top:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:7px 13px;border-radius:20px;background:rgba(255,255,255,.12);color:#e8eef6;font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer;}
.chip.active{background:#fff;color:var(--navy);}
.sortbar{display:flex;align-items:center;gap:8px;padding:10px 14px 2px;}
.sortbar .lbl{font-size:12px;color:var(--muted);font-weight:600;}
.segwrap{display:inline-flex;background:#e8edf3;border-radius:9px;padding:3px;gap:2px;}
.seg{border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;padding:6px 13px;border-radius:7px;cursor:pointer;}
.seg.active{background:#fff;color:var(--navy2);box-shadow:0 1px 2px rgba(15,39,64,.12);}
.count{padding:8px 16px 2px;font-size:12px;color:var(--muted);}
.wrap{padding:6px 12px 40px;max-width:820px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:10px 0;overflow:hidden;box-shadow:0 1px 3px rgba(15,39,64,.06);}
.card summary{list-style:none;cursor:pointer;padding:13px 14px;display:flex;flex-direction:column;gap:5px;}
.card summary::-webkit-details-marker{display:none;}
.row1{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.tname{font-size:16px;font-weight:700;color:var(--navy2);}
.yr{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}
.dchip{align-self:flex-start;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);background:#eaf2fd;padding:2px 8px;border-radius:6px;}
.blurb{font-size:14px;color:#334155;}
.meta{font-size:12px;color:var(--muted);}
.detail{padding:0 14px 14px;border-top:1px solid var(--line);}
.f{margin-top:11px;}
.f .lab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;}
.f .val{font-size:14px;color:var(--ink);}
.result{background:#f0f6ff;border-left:3px solid var(--accent);padding:8px 10px;border-radius:6px;font-size:14px;}
.caveat{background:#fff7ed;border-left:3px solid #f59e0b;padding:8px 10px;border-radius:6px;font-size:14px;}
.practice{background:#f0fdf4;border-left:3px solid #16a34a;padding:8px 10px;border-radius:6px;font-size:14px;}
.pmlink{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:13px;font-weight:600;color:#fff;background:var(--accent);padding:8px 13px;border-radius:9px;text-decoration:none;}
mark{background:#fde68a;padding:0 1px;border-radius:2px;}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
footer{text-align:center;font-size:11px;color:var(--muted);padding:16px;line-height:1.5;}
</style>
</head>
<body>
<header>
  <div class="title">PCCM Landmark Trials</div>
  <div class="sub">138 trials &middot; tap a card for detail &middot; works offline</div>
  <div class="search">
    <input id="q" type="search" placeholder="Search trial, population, drug..." autocomplete="off">
    <button class="clear" id="clr">&times;</button>
  </div>
</header>
<div class="chips" id="chips"></div>
<div class="sortbar">
  <span class="lbl">Sort</span>
  <span class="segwrap" id="sort">
    <button class="seg active" data-sort="year">Year &darr;</button>
    <button class="seg" data-sort="yearAsc">Year &uarr;</button>
    <button class="seg" data-sort="name">Name A&ndash;Z</button>
  </span>
</div>
<div class="count" id="count"></div>
<div class="wrap" id="list"></div>
<footer>Summarized and rounded for study use. Always confirm exact values, doses, and thresholds against the primary paper before any clinical or academic use.</footer>

injury", "pmid": "15474134", "caveats": "Stopped early for harm; 6-month outcomes reported separately", "practice": "Corticosteroids contraindicated in TBI"}, {"domain": "Trauma", "trial": "CRASH-3", "year": "2019", "journal": "Lancet", "n": "12737", "population": "TBI within 3 h, GCS <=12 or intracranial bleed, no major extracranial bleeding", "intervention": "Tranexamic acid 1 g load then 1 g over 8 h vs placebo", "outcome": "Head injury-related death in hospital within 28 days", "result": "18.5% vs 19.8% (RR 0.94, 95% CI 0.86-1.02); mild-moderate subgroup RR 0.78 (0.64-0.95)", "bottom": "TXA safe; reduces head-injury death in mild-moderate TBI, not severe", "pmid": "31623894", "caveats": "Overall endpoint not significant; benefit confined to mild-moderate subgroup", "practice": "Early TXA used in mild-moderate TBI in many protocols"}, {"domain": "Trauma", "trial": "CRASH-2", "year": "2010", "journal": "Lancet", "n": "20211", "population": "Adult trauma with or at risk of significant hemorrhage, within 8 h", "intervention": "Tranexamic acid 1 g bolus then 1 g over 8 h vs placebo", "outcome": "In-hospital all-cause mortality within 4 weeks", "result": "14.5% vs 16.0% (RR 0.91, 95% CI 0.85-0.97; P=0.0035); bleeding death 4.9% vs 5.7% (P=0.008)", "bottom": "TXA reduces all-cause and bleeding mortality in trauma", "pmid": "20554319", "caveats": "No benefit and possible harm if given after 3 h", "practice": "Standard of care - give TXA early in trauma hemorrhage"}, {"domain": "Trauma", "trial": "PROPPR", "year": "2015", "journal": "JAMA", "n": "680", "population": "Severely injured trauma predicted to need massive transfusion", "intervention": "Plasma:platelets:RBC 1:1:1 vs 1:1:2", "outcome": "24-h and 30-day all-cause mortality", "result": "24-h 12.7% vs 17.0% (P=0.12); 30-day 22.4% vs 26.1% (P=0.26); exsanguination death 9.2% vs 14.6% (P=0.03)", "bottom": "No mortality difference but 1:1:1 improved hemostasis and cut exsanguination deaths", "pmid": "25647203", "caveats": "Underpowered for mortality; secondary outcomes favor 1:1:1", "practice": "Balanced 1:1:1 ratio is standard damage-control resuscitation"}, {"domain": "Trauma", "trial": "ITACTIC", "year": "2021", "journal": "Intensive Care Med", "n": "396", "population": "Adult major trauma activating a major hemorrhage protocol", "intervention": "Viscoelastic-assay-guided vs conventional coagulation-test-guided augmentation", "outcome": "Alive and free of massive transfusion at 24 h", "result": "67% vs 64% (OR 1.15, 95% CI 0.76-1.73); TBI subgroup 64% vs 46% (OR 2.12, 0.84-5.34)", "bottom": "No overall benefit of viscoelastic- over conventional-test-guided transfusion", "pmid": "33048195", "caveats": "Underpowered; possible TBI-subgroup signal only", "practice": "Viscoelastic testing supported but not proven superior"}, {"domain": "Trauma", "trial": "RePHILL", "year": "2022", "journal": "Lancet Haematol", "n": "432", "population": "Trauma-related hemorrhagic shock with hypotension, prehospital", "intervention": "Up to 2 U PRBC + 2 U lyophilised plasma vs up to 1 L saline", "outcome": "Composite of episode mortality or impaired lactate clearance", "result": "64% vs 65% (adj risk diff -0.025%, 95% CI -9.0 to 9.0; P=0.996)", "bottom": "Prehospital PRBC-LyoPlas not superior to saline for the composite", "pmid": "35271808", "caveats": "Stopped early for COVID-19; open-label; most also received TXA", "practice": "Does not support routine prehospital blood over crystalloid"}, {"domain": "Cardiac Arrest / Post-Arrest", "trial": "DOSE-VF", "year": "2022", "journal": "NEJM", "n": "405", "population": "Refractory VF (after 3 standard shocks) in out-of-hospital arrest", "intervention": "Double sequential external defibrillation or vector-change vs standard defibrillation", "outcome": "Survival to hospital discharge", "result": "DSED 30.4% vs standard 13.3% (RR 2.21, 95% CI 1.33-3.67); VC 21.7% (RR 1.71, 1.01-2.88)", "bottom": "DSED and vector-change improved survival in refractory VF", "pmid": "36342151", "caveats": "Cluster crossover, stopped early for COVID-19; modest absolute numbers", "practice": "Increasingly adopted for refractory VF"}, {"domain": "Cardiac Arrest / Post-Arrest", "trial": "ALPS", "year": "2016", "journal": "NEJM", "n": "3026", "population": "Shock-refractory VF/pulseless VT out-of-hospital arrest", "intervention": "Amiodarone vs lidocaine vs saline placebo", "outcome": "Survival to hospital discharge", "result": "Amiodarone 24.4% vs lidocaine 23.7% vs placebo 21.0%; amiodarone vs placebo +3.2 points (P=0.08)", "bottom": "Neither drug significantly improved overall survival vs placebo", "pmid": "27043165", "caveats": "Witnessed-arrest subgroup showed benefit", "practice": "Antiarrhythmics remain optional in refractory VF/pVT"}, {"domain": "Cardiogenic Shock", "trial": "CULPRIT-SHOCK", "year": "2017", "journal": "NEJM", "n": "706", "population": "Acute MI with cardiogenic shock and multivessel disease", "intervention": "Culprit-lesion-only PCI vs immediate multivessel PCI", "outcome": "Death or renal-replacement therapy at 30 days", "result": "45.9% vs 55.4% (RR 0.83, 95% CI 0.71-0.96; P=0.01)", "bottom": "Culprit-only PCI reduces 30-day death/RRT vs immediate multivessel PCI", "pmid": "29083953", "caveats": "Composite driven mainly by mortality; applies only to shock", "practice": "Culprit-only PCI is guideline-recommended default in MI with shock"}];
const domains=[...new Set(TRIALS.map(t=>t.domain))].sort();
let activeDomain="All", query="", sortMode="year";
const chipsEl=document.getElementById("chips");
const listEl=document.getElementById("list");
const countEl=document.getElementById("count");
const qEl=document.getElementById("q");
const clrEl=document.getElementById("clr");

function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function hl(s){if(!query)return esc(s);const re=new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");return esc(s).replace(re,"<mark>$1</mark>");}

["All",...domains].forEach(d=>{
  const b=document.createElement("button");
  b.className="chip"+(d==="All"?" active":"");
  b.textContent=d==="All"?"All":d;
  b.onclick=()=>{activeDomain=d;[...chipsEl.children].forEach(c=>c.classList.remove("active"));b.classList.add("active");render();};
  chipsEl.appendChild(b);
});

function match(t){
  if(activeDomain!=="All"&&t.domain!==activeDomain)return false;
  if(!query)return true;
  const hay=(t.trial+" "+t.population+" "+t.intervention+" "+t.outcome+" "+t.result+" "+t.bottom+" "+t.caveats+" "+t.practice+" "+t.journal+" "+t.year+" "+t.domain).toLowerCase();
  return hay.includes(query.toLowerCase());
}
function sortRows(rows){
  const r=rows.slice();
  if(sortMode==="name") r.sort((a,b)=>a.trial.toLowerCase().localeCompare(b.trial.toLowerCase()));
  else if(sortMode==="yearAsc") r.sort((a,b)=>(+a.year-+b.year)||a.trial.localeCompare(b.trial));
  else r.sort((a,b)=>(+b.year-+a.year)||a.trial.localeCompare(b.trial));
  return r;
}
function pm(t){
  if(!t.pmid||t.pmid==="NA")return "";
  return `<a class="pmlink" href="https://pubmed.ncbi.nlm.nih.gov/${esc(t.pmid)}/" target="_blank" rel="noopener">View on PubMed &rarr; PMID ${esc(t.pmid)}</a>`;
}
function render(){
  const rows=sortRows(TRIALS.filter(match));
  countEl.textContent=rows.length+" trial"+(rows.length===1?"":"s");
  if(!rows.length){listEl.innerHTML='<div class="empty">No trials match.<br>Try a different search or filter.</div>';return;}
  listEl.innerHTML=rows.map(t=>`
    <details class="card">
      <summary>
        <span class="dchip">${esc(t.domain)}</span>
        <span class="row1"><span class="tname">${hl(t.trial)}</span><span class="yr">${esc(t.year)} &middot; ${esc(t.journal)}</span></span>
        <span class="blurb">${hl(t.bottom)}</span>
      </summary>
      <div class="detail">
        <div class="f"><div class="lab">Population</div><div class="val">${hl(t.population)} <span class="meta">(N&asymp;${esc(t.n)})</span></div></div>
        <div class="f"><div class="lab">Intervention vs Control</div><div class="val">${hl(t.intervention)}</div></div>
        <div class="f"><div class="lab">Primary Outcome</div><div class="val">${hl(t.outcome)}</div></div>
        <div class="f"><div class="lab">Key Result</div><div class="val result">${hl(t.result)}</div></div>
        <div class="f"><div class="lab">Bottom Line</div><div class="val">${hl(t.bottom)}</div></div>
        <div class="f"><div class="lab">Caveats / Limitations</div><div class="val caveat">${hl(t.caveats)}</div></div>
        <div class="f"><div class="lab">Current Practice</div><div class="val practice">${hl(t.practice)}</div></div>
        ${pm(t)}
      </div>
    </details>`).join("");
}
document.getElementById("sort").addEventListener("click",e=>{
  const b=e.target.closest(".seg");if(!b)return;
  sortMode=b.dataset.sort;
  [...b.parentNode.children].forEach(s=>s.classList.remove("active"));b.classList.add("active");
  render();
});
qEl.addEventListener("input",()=>{query=qEl.value.trim();clrEl.style.display=query?"block":"none";render();});
clrEl.onclick=()=>{qEl.value="";query="";clrEl.style.display="none";render();qEl.focus();};
render();
</script>
</body>
